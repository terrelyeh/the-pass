<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配圖總覽 — The Pass</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&family=Instrument+Serif&display=swap');
:root{--ink:#2C3345;--ink-light:#5A6178;--ink-muted:#8B90A0;--bg:#FAFAF8;--bg-warm:#F5F3EF;--accent:#B8860B;--accent-light:#D4A843;--border:#E8E6E1;--white:#fff;--sans:'Noto Sans TC',sans-serif;--display:'Instrument Serif','Noto Serif TC',serif;}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.7;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums}
.top{position:sticky;top:0;z-index:70;border-bottom:1px solid var(--border);background:var(--white)}
.top-in{max-width:1080px;margin:0 auto;padding:.55rem 1.5rem;display:flex;justify-content:space-between;align-items:center;gap:.6rem}
.top-left{display:flex;align-items:center;gap:.55rem;min-width:0}
.menu-btn{display:none;align-items:center;justify-content:center;flex:none;width:34px;height:34px;background:none;border:1px solid var(--border);border-radius:7px;color:var(--ink-light);cursor:pointer}
.menu-btn:hover{background:var(--bg-warm);color:var(--ink)}
.backdrop{display:none;position:fixed;inset:0;background:rgba(44,51,69,.4);z-index:55}body.nav-open .backdrop{display:block}
.top h1{font-family:var(--display);font-size:1.25rem;font-weight:400;line-height:1.25}
.top a.home{font-size:.78rem;color:var(--ink-muted);text-decoration:none}.top a.home:hover{color:var(--accent)}
.layout{display:grid;grid-template-columns:200px 1fr;max-width:1080px;margin:0 auto;min-height:calc(100vh - 3.4rem)}
.side{position:sticky;top:3.1rem;align-self:start;height:calc(100vh - 3.1rem);overflow-y:auto;border-right:1px solid var(--border);background:var(--white);padding:1.4rem 1rem 2rem 1.25rem}
.side .lbl{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-muted);font-weight:700;margin-bottom:.7rem}
.side a{display:block;text-decoration:none;padding:.45rem .6rem;border-radius:6px;margin-bottom:.2rem;cursor:pointer}.side a:hover{background:var(--bg-warm)}
.side a.cur{background:var(--bg-warm);box-shadow:inset 2px 0 0 var(--accent)}.side a.cur .d{color:var(--accent)}
.side a .d{font-size:.82rem;font-weight:700;color:var(--ink);display:block}.side a .t{font-size:.72rem;color:var(--ink-light);display:block;line-height:1.25}
.main{padding:1.8rem 2rem 4rem;max-width:820px}
.period{display:none}.period.active{display:block;animation:fade .2s ease}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.p-head{border-bottom:2px solid var(--accent-light);padding-bottom:.4rem;margin-bottom:1.4rem}
.p-head h2{font-family:var(--display);font-size:1.7rem;font-weight:400}.p-head .meta{font-size:.78rem;color:var(--ink-muted)}
.cover{margin-bottom:2.2rem}
.cover img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;border:1px solid var(--border);border-radius:10px;background:var(--bg-warm)}
.cover .t{font-family:var(--display);font-size:1.25rem;font-weight:400;margin:.7rem 0 .2rem;line-height:1.4}
.cover .idea{font-size:.86rem;color:var(--accent);font-weight:500}
.cover .lnk{font-size:.78rem;color:var(--ink-muted);margin-top:.3rem}.cover .lnk a{color:var(--accent);text-decoration:none}
@media(max-width:820px){.layout{grid-template-columns:1fr}.menu-btn{display:inline-flex}.side{position:fixed;top:0;left:0;width:240px;max-width:82vw;height:100vh;padding:3.4rem 1rem 2rem 1.25rem;transform:translateX(-100%);transition:transform .22s ease;z-index:60}body.nav-open .side{transform:none;box-shadow:2px 0 24px rgba(0,0,0,.14)}.main{padding:1.4rem 1.4rem 3rem}}
</style></head><body>
<div class="top"><div class="top-in">
  <div class="top-left">
    <button class="menu-btn" id="menuBtn" aria-label="期數目錄" aria-expanded="false"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <h1>配圖總覽</h1>
  </div>
  <a class="home" href="hub.html">系統入口 ↗</a>
</div></div>
<div class="backdrop" id="backdrop"></div>
<div class="layout">
  <aside class="side">
    <div class="lbl">期數（by date）</div>
    <a href="#c-2026-06-19" data-target="c-2026-06-19"><span class="d">2026-06-19</span><span class="t">首期 · 咖哩味覺 / 點酒 AI</span></a>
  </aside>
  <main class="main">
    <section id="c-2026-06-19" class="period active">
      <div class="p-head"><h2>2026-06-19</h2><span class="meta">首期 · 長文配圖 2 張（紐約客式概念 · nanobanana）</span></div>
      <div class="cover">
        <img src="img/issue-2026-06-19-1.png" alt="老師傅餵 teal 機器人嚐咖哩">
        <div class="t">四十年的咖哩味，他們正在教機器怎麼嚐</div>
        <div class="idea">概念：老師傅溫柔地餵 teal 小機器人嚐咖哩——教機器品味的溫柔荒謬。</div>
        <div class="lnk">→ <a href="issue-2026-06-19.html#">看這篇所在的 issue 頁 ↗</a></div>
      </div>
      <div class="cover">
        <img src="img/issue-2026-06-19-2.png" alt="客人捧手機如神諭、懂酒的侍酒師淡出">
        <div class="t">最懂酒的人就站在桌邊，他們卻問了 ChatGPT</div>
        <div class="idea">概念：客人捧發光手機如神諭，身後懂酒的侍酒師漸漸淡出消散——活人專業被當空氣。</div>
        <div class="lnk">→ <a href="issue-2026-06-19.html#">看這篇所在的 issue 頁 ↗</a></div>
      </div>
    </section>
  </main>
</div>
<script>
(function(){
  var periods=[].slice.call(document.querySelectorAll('.period'));
  var links=[].slice.call(document.querySelectorAll('.side a[data-target]'));
  var b=document.getElementById('menuBtn'),d=document.getElementById('backdrop');
  function closeNav(){document.body.classList.remove('nav-open');if(b)b.setAttribute('aria-expanded','false');}
  function show(id){
    if(!periods.some(function(s){return s.id===id;}))return false;
    periods.forEach(function(s){s.classList.toggle('active',s.id===id);});
    links.forEach(function(a){a.classList.toggle('cur',a.getAttribute('data-target')===id);});
    try{history.replaceState(null,'','#'+id);}catch(e){}
    window.scrollTo(0,0);return true;
  }
  links.forEach(function(a){a.addEventListener('click',function(e){e.preventDefault();show(a.getAttribute('data-target'));closeNav();});});
  var h=decodeURIComponent((location.hash||'').replace('#',''));
  if(!h||!show(h)){if(periods[0])show(periods[0].id);}
  window.addEventListener('hashchange',function(){var x=decodeURIComponent((location.hash||'').replace('#',''));if(x)show(x);});
  if(b)b.addEventListener('click',function(){var o=document.body.classList.toggle('nav-open');b.setAttribute('aria-expanded',o);});
  if(d)d.addEventListener('click',closeNav);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeNav();});
})();
</script>
</body></html>
